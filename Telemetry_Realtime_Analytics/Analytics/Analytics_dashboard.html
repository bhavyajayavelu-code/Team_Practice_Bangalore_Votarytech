<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fleet Telemetry Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:12px}
h1{font-size:22px;margin-bottom:12px}
.container{display:grid;grid-template-columns:1fr 2fr 1fr;gap:12px}
.card{background:#fff;padding:12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
h3{margin:0 0 6px;font-size:16px}
.value{font-size:28px}
.motion{font-size:22px;font-weight:bold}
.direction-box{height:60px;display:flex;align-items:center;justify-content:center;font-size:44px}
p{font-size:12px;color:#666}
canvas{height:180px!important}

#alertBox{
display:none;
background:#ffebee;
color:#c62828;
padding:12px;
margin-bottom:12px;
border-radius:6px;
font-weight:bold;
text-align:center;
font-size:16px;
}
</style>
</head>

<body>

<h1>🚗 Fleet Telemetry Dashboard</h1>

<div id="alertBox">
⚠️ Unsafe Driving Detected! Driver behavior exceeded safe limit.
</div>

<div class="container">

<div class="card">
<h3>AC Temperature</h3>
<div class="value" id="tempValue">-- °C</div>
<p>Realtime vehicle data</p>
</div>

<div class="card">
<h3>Temperature Trend</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="card">
<h3>Driver Behavior Events</h3>
<canvas id="driverChart"></canvas>
</div>

<div class="card">
<h3>Vehicle Motion</h3>
<div class="direction-box" id="direction">⬜</div>
<div class="motion" id="motionValue">--</div>
<p>Based on MPU6050 Tilt</p>
</div>

<div class="card" style="grid-column:span 2">
<h3>Vehicle Motion Trend</h3>
<canvas id="motionChart"></canvas>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* Firebase Config */

const firebaseConfig={
apiKey:"AIzaSyCR_FwvqqMGctW9i6MNn4ZUAGcuIjxPAqQ",
authDomain:"edge-data-filtering.firebaseapp.com",
databaseURL:"https://edge-data-filtering-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"edge-data-filtering"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

/* DOM */

const tempValue=document.getElementById("tempValue");
const motionValue=document.getElementById("motionValue");
const direction=document.getElementById("direction");
const alertBox=document.getElementById("alertBox");

const ALERT_LIMIT = 5;

/* Charts */

const tempChart=new Chart(
document.getElementById("tempChart").getContext("2d"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Temperature (°C)",
data:[],
borderColor:"blue",
tension:0.3
}]
}
});

const motionChart=new Chart(
document.getElementById("motionChart").getContext("2d"),{
type:"line",
data:{
labels:[],
datasets:[{
label:"Tilt Position",
data:[],
borderColor:"#2196f3",
tension:0.3
}]
},
options:{
scales:{
y:{
min:-2,
max:2,
ticks:{
callback:v=>({
"-2":"BACK",
"-1":"LEFT",
"0":"FLAT",
"1":"RIGHT",
"2":"FRONT"
}[v])
}
}
}
}
});

const driverChart=new Chart(
document.getElementById("driverChart").getContext("2d"),{
type:"bar",
data:{
labels:["Harsh Accel","Harsh Brake","Aggressive Corner"],
datasets:[{
label:"Count per Trip",
data:[0,0,0],
backgroundColor:["#ff9800","#f44336","#9c27b0"]
}]
},
options:{
scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}
}
});

/* Temperature */

onValue(ref(db,"Sensor/temperature"),snapshot=>{

const temp=snapshot.val();

if(temp===null || temp===undefined || temp==="" || temp===-127){
tempValue.innerText="-- °C";
tempValue.style.color="black";
return;
}

const numeric=parseFloat(temp);

if(isNaN(numeric)){
tempValue.innerText="-- °C";
return;
}

tempValue.innerText=numeric.toFixed(2)+" °C";

/* color */

if(numeric>28){
tempValue.style.color="red";
tempChart.data.datasets[0].borderColor="red";
}else{
tempValue.style.color="blue";
tempChart.data.datasets[0].borderColor="blue";
}

/* chart update ONLY when valid value */

tempChart.data.labels.push(new Date().toLocaleTimeString());
tempChart.data.datasets[0].data.push(numeric);

if(tempChart.data.labels.length>15){
tempChart.data.labels.shift();
tempChart.data.datasets[0].data.shift();
}

tempChart.update();

});

/* Vehicle Tilt */

onValue(ref(db,"vehicle/tilt"),s=>{
const tilt=s.val();
if(!tilt) return;

const map={back:-2,left:-1,flat:0,right:1,front:2};
const icon={back:"⬇️",left:"⬅️",flat:"✅",right:"➡️",front:"⬆️"};

direction.innerText=icon[tilt] || "⬜";
motionValue.innerText=tilt.toUpperCase();

motionChart.data.labels.push(new Date().toLocaleTimeString());
motionChart.data.datasets[0].data.push(map[tilt]);

if(motionChart.data.labels.length>15){
motionChart.data.labels.shift();
motionChart.data.datasets[0].data.shift();
}

motionChart.update();
});

/* Driver Behavior */

let accel=0, brake=0, corner=0;

function checkAlert(){
if(accel>ALERT_LIMIT || brake>ALERT_LIMIT || corner>ALERT_LIMIT){
alertBox.style.display="block";
}else{
alertBox.style.display="none";
}
}

onValue(ref(db,"driving/harsh_acceleration"),s=>{
accel=s.val()??0;
driverChart.data.datasets[0].data[0]=accel;
driverChart.update();
checkAlert();
});

onValue(ref(db,"driving/harsh_braking"),s=>{
brake=s.val()??0;
driverChart.data.datasets[0].data[1]=brake;
driverChart.update();
checkAlert();
});

onValue(ref(db,"driving/aggressive_corner"),s=>{
corner=s.val()??0;
driverChart.data.datasets[0].data[2]=corner;
driverChart.update();
checkAlert();
});

</script>

</body>
</html>
